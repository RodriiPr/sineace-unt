version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sineace_unt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sineace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sineace_pass_2025}
      POSTGRES_DB: ${POSTGRES_DB:-sineace_unt}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sineace_user} -d ${POSTGRES_DB:-sineace_unt}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
